<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Color Toolbox</title>
<style>
:root{
    --bg:#0f1115;
    --card:#181b22;
    --border:#2b313c;
    --text:#f5f7fa;
    --muted:#9aa4b2;
}
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Inter,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:20px;
}
h1{text-align:center}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}
.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
}
label{display:block;margin:8px 0}
input,button{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid var(--border);
}
button{cursor:pointer}
.preview{
    height:100px;
    border-radius:10px;
    margin-top:10px;
    border:1px solid var(--border);
}
.palette{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:10px;
}
.swatch{
    width:60px;
    height:60px;
    border-radius:8px;
    border:1px solid var(--border);
}
code{
    display:block;
    padding:8px;
    background:#10131a;
    border-radius:8px;
    overflow:auto;
}
</style>
</head>
<body>
<h1>Hex Color Toolbox</h1>

<div class="grid">

<div class="card">
<h3>Color Picker</h3>
<input type="color" id="color" value="#00ffff">
<label>HEX <input id="hex"></label>
<label>RGB <input id="rgb" readonly></label>
<label>HSL <input id="hsl" readonly></label>
<div class="preview" id="preview"></div>
</div>

<div class="card">
<h3>Opacity Generator</h3>
<input type="range" min="0" max="100" value="100" id="opacity">
<div id="opacityText"></div>
</div>

<div class="card">
<h3>Tint (Mix With White)</h3>
<input type="range" min="0" max="100" value="20" id="tint">
<div id="tintText"></div>
</div>

<div class="card">
<h3>Shade (Mix With Black)</h3>
<input type="range" min="0" max="100" value="20" id="shade">
<div id="shadeText"></div>
</div>

<div class="card">
<h3>Gradient Generator</h3>
<input type="color" id="g1" value="#00ffff">
<input type="color" id="g2" value="#ff00ff">
<div class="preview" id="gradientPreview"></div>
<code id="gradientCode"></code>
</div>

<div class="card">
<h3>Random Color</h3>
<button onclick="randomColor()">Generate</button>
</div>

<div class="card">
<h3>Palette Generator</h3>
<div class="palette" id="palette"></div>
</div>

<div class="card">
<h3>Contrast Checker</h3>
<input type="color" id="bgColor" value="#000000">
<input type="color" id="textColor" value="#ffffff">
<div id="contrastResult"></div>
</div>

</div>

<script>
const color=document.getElementById("color");
const hex=document.getElementById("hex");

function hexToRgb(h){
 let r=parseInt(h.slice(1,3),16);
 let g=parseInt(h.slice(3,5),16);
 let b=parseInt(h.slice(5,7),16);
 return {r,g,b};
}

function rgbToHsl(r,g,b){
 r/=255;g/=255;b/=255;
 let max=Math.max(r,g,b),min=Math.min(r,g,b);
 let h,s,l=(max+min)/2;
 if(max===min){h=s=0;}
 else{
  let d=max-min;
  s=l>0.5?d/(2-max-min):d/(max+min);
  switch(max){
   case r:h=(g-b)/d+(g<b?6:0);break;
   case g:h=(b-r)/d+2;break;
   case b:h=(r-g)/d+4;break;
  }
  h/=6;
 }
 return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

function mix(c1,c2,p){
 return Math.round(c1+(c2-c1)*p);
}

function rgbToHex(r,g,b){
 return "#" + [r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
}

function update(){
 let h=color.value;
 hex.value=h;

 let rgbv=hexToRgb(h);
 document.getElementById("rgb").value=`rgb(${rgbv.r}, ${rgbv.g}, ${rgbv.b})`;

 let hsl=rgbToHsl(rgbv.r,rgbv.g,rgbv.b);
 document.getElementById("hsl").value=`hsl(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%)`;

 document.getElementById("preview").style.background=h;

 let op=document.getElementById("opacity").value/100;
 document.getElementById("opacityText").textContent=
 `rgba(${rgbv.r}, ${rgbv.g}, ${rgbv.b}, ${op})`;

 let tint=document.getElementById("tint").value/100;
 let tintHex=rgbToHex(
  mix(rgbv.r,255,tint),
  mix(rgbv.g,255,tint),
  mix(rgbv.b,255,tint)
 );
 document.getElementById("tintText").textContent=tintHex;

 let shade=document.getElementById("shade").value/100;
 let shadeHex=rgbToHex(
  mix(rgbv.r,0,shade),
  mix(rgbv.g,0,shade),
  mix(rgbv.b,0,shade)
 );
 document.getElementById("shadeText").textContent=shadeHex;

 let pal=document.getElementById("palette");
 pal.innerHTML="";
 for(let i=0;i<5;i++){
   let factor=i/4;
   let c=rgbToHex(
    mix(rgbv.r,255,factor*0.6),
    mix(rgbv.g,255,factor*0.6),
    mix(rgbv.b,255,factor*0.6)
   );
   pal.innerHTML+=`<div class="swatch" title="${c}" style="background:${c}"></div>`;
 }
 updateContrast();
}

function updateGradient(){
 let a=document.getElementById("g1").value;
 let b=document.getElementById("g2").value;
 let css=`linear-gradient(90deg, ${a}, ${b})`;
 document.getElementById("gradientPreview").style.background=css;
 document.getElementById("gradientCode").textContent=css;
}

function luminance(hex){
 let {r,g,b}=hexToRgb(hex);
 let arr=[r,g,b].map(v=>{
  v/=255;
  return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);
 });
 return 0.2126*arr[0]+0.7152*arr[1]+0.0722*arr[2];
}

function updateContrast(){
 let bg=document.getElementById("bgColor").value;
 let tx=document.getElementById("textColor").value;
 let l1=luminance(bg);
 let l2=luminance(tx);
 let ratio=(Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
 document.getElementById("contrastResult").textContent=
 `Contrast Ratio: ${ratio.toFixed(2)}:1`;
}

function randomColor(){
 color.value="#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
 update();
}

color.addEventListener("input",update);
hex.addEventListener("input",()=>{
 if(/^#[0-9a-fA-F]{6}$/.test(hex.value)){
   color.value=hex.value;
   update();
 }
});

["opacity","tint","shade"].forEach(id=>
 document.getElementById(id).addEventListener("input",update)
);

["g1","g2"].forEach(id=>
 document.getElementById(id).addEventListener("input",updateGradient)
);

["bgColor","textColor"].forEach(id=>
 document.getElementById(id).addEventListener("input",updateContrast)
);

update();
updateGradient();
</script>
</body>
</html>
